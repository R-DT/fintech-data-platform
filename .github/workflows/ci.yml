name: Fintech Data Platform CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test_suite:
    runs-on: ubuntu-latest

    services:
      # Automatically spin up an isolated test database container for the runner environment
      postgres_test:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fintech_db
        ports:
          - 5432:5432
        # Wait until PostgreSQL is alive before launching script checks
        options: >-
          --health-cmd "pg_isready -U postgres -d fintech_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code Repository Tracks
      uses: actions/checkout@v4

    - name: Initialize Stable Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Pinned Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .

    - name: Execute Automated Validation Suites
      env:
        DB_USER: postgres
        DB_PASS: postgres
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: fintech_db
      run: |
        python -m pytest
